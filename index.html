<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Dashboard</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --bg-deep: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --main-bg: rgba(30, 41, 59, 0.5);
            --accent-primary: #3b82f6; 
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --item-hover: rgba(255, 255, 255, 0.05);
            --radius-lg: 16px;
            --radius-md: 10px;
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(0, 0, 0, 0.2);
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        body.theme-light {
            --bg-deep: #f1f5f9;
            --sidebar-bg: #ffffff;
            --main-bg: #f8fafc;
            --accent-primary: #2563eb; 
            --accent-glow: rgba(37, 99, 235, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --item-hover: #f1f5f9;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 0% 0%, var(--accent-glow) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, var(--accent-glow) 0%, transparent 35%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center; padding: 20px;
            transition: background-color 0.4s ease;
            overflow: hidden;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 100%; max-width: 1280px; height: 85vh; 
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: var(--radius-lg);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: appEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* SIDEBAR */
        aside {
            background: rgba(0, 0, 0, 0.05);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 32px 24px;
        }

        .logo-section { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo-icon { width: 32px; height: 32px; background: var(--accent-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-text { 
            font-size: 20px; font-weight: 800; 
            background: linear-gradient(to right, var(--text-main), var(--accent-primary)); 
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .nav-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin: 24px 0 12px 8px; }
        
        .filter-btn { 
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; border-radius: var(--radius-md); color: var(--text-muted); 
            cursor: pointer; border: none; background: transparent; width: 100%; 
            font-size: 14px; text-align: left; transition: 0.2s; margin-bottom: 4px;
        }
        .filter-btn div { display: flex; align-items: center; gap: 12px; }
        .filter-btn:hover { background: var(--item-hover); color: var(--text-main); }
        .filter-btn.active { background: var(--accent-glow); color: var(--accent-primary); font-weight: 600; }

        .count-badge { font-size: 10px; background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 10px; color: var(--text-muted); font-weight: 700; }
        .active .count-badge { background: var(--accent-primary); color: white; }

        .data-actions { display: flex; gap: 8px; margin-top: 8px; padding: 0 8px; }
        .data-btn { 
            flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 8px; border-radius: 8px; border: 1px solid var(--border);
            background: var(--card-bg); color: var(--text-muted); font-size: 11px;
            cursor: pointer; transition: 0.2s;
        }
        .data-btn:hover { background: var(--item-hover); color: var(--text-main); border-color: var(--accent-primary); }

        .shortcut-legend { margin-top: 20px; padding: 12px; background: rgba(0,0,0,0.1); border-radius: 8px; font-size: 10px; color: var(--text-muted); }
        .shortcut-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .key { background: var(--border); padding: 2px 4px; border-radius: 4px; color: var(--text-main); font-family: monospace; }

        .stats-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 16px; margin-top: auto; }
        .progress-bar { height: 4px; background: rgba(0,0,0,0.1); border-radius: 2px; margin: 8px 0; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent-primary); width: 0%; transition: 0.5s; }

        /* MAIN */
        main { display: flex; flex-direction: column; background: var(--main-bg); overflow: hidden; }
        header { padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; }
        .theme-toggle-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; }

        .input-section { padding: 0 48px 32px; }
        .input-container { 
            background: var(--input-bg); border: 1px solid var(--border); border-radius: 14px; 
            padding: 8px 8px 8px 20px; display: flex; align-items: center; gap: 12px; transition: 0.3s;
        }
        .input-container:focus-within { border-color: var(--accent-primary); box-shadow: 0 0 15px var(--accent-glow); }
        .input-container input[type="text"] { flex: 1; background: transparent; border: none; outline: none; color: var(--text-main); font-size: 16px; }
        .input-container input[type="date"] { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); padding: 6px; font-size: 12px; outline: none; color-scheme: dark; }
        body.theme-light .input-container input[type="date"] { color-scheme: light; }

        .btn-add { background: var(--accent-primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* LISTA */
        .content-scroll { flex: 1; overflow-y: auto; padding: 0 48px 40px; scroll-behavior: smooth; }
        .todo-item { 
            background: var(--card-bg); border: 1px solid var(--border); margin-bottom: 12px; 
            padding: 16px 24px; border-radius: var(--radius-md); display: flex; align-items: center; 
            gap: 16px; transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            position: relative; animation: slideIn 0.3s ease-out;
        }
        .todo-item.completed { opacity: 0.6; transform: scale(0.96); background: rgba(0, 0, 0, 0.05); border-color: transparent; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .todo-item.selected { border-color: var(--accent-primary); background: var(--item-hover); box-shadow: 0 0 10px var(--accent-glow); }

        .checkbox { width: 22px; height: 22px; border: 2px solid var(--accent-primary); border-radius: 50%; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .completed .checkbox { background: var(--accent-primary); transform: scale(0.9); }
        .completed .task-title { text-decoration: line-through; color: var(--text-muted); }

        .task-content { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .task-meta { display: flex; gap: 12px; font-size: 11px; color: var(--text-muted); }
        .due-soon { color: var(--warning); font-weight: 600; }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000; animation: fadeIn 0.3s ease;
        }
        .modal-content {
            background: var(--sidebar-bg); border: 1px solid var(--border);
            padding: 32px; border-radius: 24px; width: 90%; max-width: 400px;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: popIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-icon { width: 60px; height: 60px; background: rgba(239, 68, 68, 0.1); color: var(--danger); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text-main); }
        .modal-text { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-cancel { background: var(--item-hover); color: var(--text-main); }
        .btn-confirm { background: var(--danger); color: white; }

        .action-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; }
        .action-btn:hover { color: var(--danger); background: var(--item-hover); }

        .empty-state { text-align: center; padding: 60px; color: var(--text-muted); opacity: 0.6; }

        @media (max-width: 900px) {
            .dashboard-container { grid-template-columns: 1fr; height: 95vh; }
            aside { display: none; }
            header, .input-section, .content-scroll { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- MODAL -->
    <div class="modal-overlay" id="delete-modal">
        <div class="modal-content">
            <div class="modal-icon"><i data-lucide="alert-triangle" size="28"></i></div>
            <h3 class="modal-title">Excluir Tarefa?</h3>
            <p class="modal-text" id="modal-task-name"></p>
            <div class="modal-actions">
                <button class="modal-btn btn-cancel" id="modal-cancel">Cancelar</button>
                <button class="modal-btn btn-confirm" id="modal-confirm">Confirmar</button>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <aside>
            <div class="logo-section">
                <div class="logo-icon"><i data-lucide="zap" size="18" color="white"></i></div>
                <span class="logo-text">TaskFlow</span>
            </div>
            <nav>
                <div class="nav-label">Menu</div>
                <button class="filter-btn active" data-filter="all">
                    <div><i data-lucide="layers" size="18"></i> Todas</div>
                    <span class="count-badge" id="count-all">0</span>
                </button>
                <button class="filter-btn" data-filter="pending">
                    <div><i data-lucide="circle" size="18"></i> Pendentes</div>
                    <span class="count-badge" id="count-pending">0</span>
                </button>
                <button class="filter-btn" data-filter="completed">
                    <div><i data-lucide="check-circle" size="18"></i> Concluídas</div>
                    <span class="count-badge" id="count-completed">0</span>
                </button>
            </nav>

            <div class="nav-label">Backup</div>
            <div class="data-actions">
                <button class="data-btn" onclick="exportTasks()" title="Exportar para arquivo">
                    <i data-lucide="download" size="14"></i> Exportar
                </button>
                <button class="data-btn" onclick="document.getElementById('import-file').click()" title="Importar de arquivo">
                    <i data-lucide="upload" size="14"></i> Importar
                </button>
                <input type="file" id="import-file" style="display: none" accept=".json">
            </div>

            <div class="shortcut-legend">
                <p style="font-weight: 700; margin-bottom: 8px; text-transform: uppercase;">Teclado</p>
                <div class="shortcut-item"><span>Buscar/Add</span> <span class="key">Ctrl + K</span></div>
                <div class="shortcut-item"><span>Navegar</span> <span class="key">↑ ↓</span></div>
                <div class="shortcut-item"><span>Concluir</span> <span class="key">Espaço</span></div>
                <div class="shortcut-item"><span>Apagar</span> <span class="key">Del</span></div>
            </div>

            <div class="stats-card">
                <div style="display: flex; justify-content: space-between; font-size: 12px;">
                    <span>Progresso</span> <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
                <div id="count-summary" style="font-size: 11px; opacity: 0.6; margin-top: 8px;">0/0 tarefas</div>
            </div>
        </aside>

        <main>
            <header>
                <div>
                    <h2 id="filter-title">Todas as Tarefas</h2>
                    <p id="current-date" style="font-size: 13px; color: var(--text-muted);"></p>
                </div>
                <button class="theme-toggle-btn" id="theme-toggle">
                    <i data-lucide="sun" id="theme-icon" size="16"></i>
                    <span id="theme-name">Modo Claro</span>
                </button>
            </header>

            <section class="input-section">
                <div class="input-container">
                    <i data-lucide="search" size="18" color="#94a3b8" id="input-icon"></i>
                    <input type="text" id="todo-input" placeholder="Pesquise ou adicione..." autocomplete="off">
                    <input type="date" id="todo-date">
                    <button class="btn-add" id="add-btn">Adicionar</button>
                </div>
            </section>

            <section class="content-scroll" id="scroll-container">
                <ul id="todo-list" style="list-style: none;"></ul>
                <div id="empty-state" class="empty-state">
                    <i data-lucide="sparkles" size="40"></i>
                    <p style="margin-top: 10px;" id="empty-text">Tudo organizado!</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- ESTADO ---
        let todos = JSON.parse(localStorage.getItem('tasks_v4_pro')) || [];
        let currentFilter = 'all';
        let currentTheme = localStorage.getItem('taskflow_theme') || 'gray';
        let searchTerm = "";
        let selectedIndex = -1;
        let taskIdToDelete = null;

        const input = document.getElementById('todo-input');
        const inputDate = document.getElementById('todo-date');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');
        const scrollContainer = document.getElementById('scroll-container');
        const themeToggle = document.getElementById('theme-toggle');
        const modal = document.getElementById('delete-modal');
        const fileInput = document.getElementById('import-file');

        function save() { localStorage.setItem('tasks_v4_pro', JSON.stringify(todos)); }

        // --- BACKUP ---
        function exportTasks() {
            if (todos.length === 0) return;
            const data = JSON.stringify(todos, null, 2);
            const blob = new Blob([data], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup-taskflow-${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    if (Array.isArray(imported)) { todos = imported; save(); render(); }
                } catch (err) { console.error("Erro importação"); }
            };
            reader.readAsText(file);
        });

        // --- BUSCA ---
        input.addEventListener('input', (e) => {
            searchTerm = e.target.value.toLowerCase();
            selectedIndex = -1; render();
            const icon = document.getElementById('input-icon');
            icon.setAttribute('data-lucide', searchTerm.length > 0 ? 'filter' : 'search');
            lucide.createIcons();
        });

        // --- TEMA ---
        function applyTheme(theme) {
            document.body.classList.toggle('theme-light', theme === 'light');
            document.getElementById('theme-name').innerText = theme === 'light' ? "Modo Escuro" : "Modo Claro";
            document.getElementById('theme-icon').setAttribute('data-lucide', theme === 'light' ? 'moon' : 'sun');
            localStorage.setItem('taskflow_theme', theme);
            currentTheme = theme; lucide.createIcons();
        }

        // --- DATAS ---
        function getDueLabel(dateStr) {
            if (!dateStr) return null;
            const d = new Date(dateStr + 'T12:00:00');
            const today = new Date(); today.setHours(0,0,0,0);
            const diff = Math.ceil((d - today) / (1000 * 60 * 60 * 24));
            if (diff === 0) return { text: "vence hoje", urgent: true };
            if (diff === 1) return { text: "vence amanhã", urgent: true };
            if (diff < 0) return { text: "atrasada", urgent: true };
            return { text: `vence ${d.toLocaleDateString('pt-BR')}`, urgent: false };
        }

        // --- RENDERIZAÇÃO ---
        function render() {
            const allCount = todos.length;
            const pendingCount = todos.filter(t => !t.completed).length;
            const completedCount = todos.filter(t => t.completed).length;
            document.getElementById('count-all').innerText = allCount;
            document.getElementById('count-pending').innerText = pendingCount;
            document.getElementById('count-completed').innerText = completedCount;

            const titles = { all: "Todas", pending: "Pendentes", completed: "Concluídas" };
            const currentCount = currentFilter === 'all' ? allCount : (currentFilter === 'pending' ? pendingCount : completedCount);
            document.getElementById('filter-title').innerText = `${titles[currentFilter]} (${currentCount})`;

            todoList.innerHTML = '';
            let filtered = todos.filter(t => {
                const matchesSearch = t.text.toLowerCase().includes(searchTerm);
                const matchesCategory = (currentFilter === 'all') || (currentFilter === 'pending' && !t.completed) || (currentFilter === 'completed' && t.completed);
                return matchesSearch && matchesCategory;
            });

            filtered.sort((a, b) => {
                if (a.completed !== b.completed) return a.completed ? 1 : -1;
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            document.getElementById('empty-state').style.display = filtered.length ? 'none' : 'block';
            document.getElementById('empty-text').innerText = searchTerm ? "Nada encontrado." : "Tudo pronto por hoje!";

            filtered.forEach((t, index) => {
                const li = document.createElement('li');
                li.className = `todo-item ${t.completed ? 'completed' : ''} ${index === selectedIndex ? 'selected' : ''}`;
                const due = getDueLabel(t.dueDate);
                const createdDate = new Date(t.createdAt).toLocaleDateString('pt-BR');

                li.innerHTML = `
                    <div class="checkbox" onclick="toggleTodo(${t.id})"><i data-lucide="check" size="12" color="white"></i></div>
                    <div class="task-content">
                        <span class="task-title">${t.text}</span>
                        <div class="task-meta">
                            <span><i data-lucide="calendar-plus" size="10"></i> ${createdDate}</span>
                            ${due ? `<span class="${due.urgent ? 'due-soon' : ''}"><i data-lucide="calendar-clock" size="10"></i> ${due.text}</span>` : ''}
                        </div>
                    </div>
                    <button class="action-btn" onclick="askDeleteTodo(${t.id})"><i data-lucide="trash-2" size="14"></i></button>
                `;
                todoList.appendChild(li);
            });

            const done = todos.filter(t => t.completed).length;
            const percent = todos.length ? Math.round((done / todos.length) * 100) : 0;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('progress-percent').innerText = percent + '%';
            document.getElementById('count-summary').innerText = `${done}/${todos.length} tarefas`;
            lucide.createIcons();
        }

        // --- MODAL ---
        function askDeleteTodo(id) {
            taskIdToDelete = id;
            const task = todos.find(t => t.id === id);
            document.getElementById('modal-task-name').innerText = `Deseja excluir "${task.text}"?`;
            modal.style.display = 'flex';
        }
        document.getElementById('modal-cancel').onclick = () => { modal.style.display = 'none'; taskIdToDelete = null; input.focus(); };
        document.getElementById('modal-confirm').onclick = () => {
            if (taskIdToDelete) {
                todos = todos.filter(t => t.id !== taskIdToDelete);
                save(); render(); modal.style.display = 'none'; taskIdToDelete = null; selectedIndex = -1; input.focus();
            }
        };

        // --- AÇÕES ---
        function addTodo() {
            const text = input.value.trim();
            if (!text) return;
            todos.unshift({ id: Date.now(), text, completed: false, createdAt: new Date().toISOString(), dueDate: inputDate.value || null });
            input.value = ''; inputDate.value = ''; searchTerm = ""; selectedIndex = -1;
            save(); render();
            input.focus();
            
            // 11️⃣ SCROLL AUTOMÁTICO SUAVE
            scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
        }
        function toggleTodo(id) {
            todos = todos.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            save(); render();
        }

        // --- TECLADO ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') document.getElementById('modal-cancel').onclick();
            if (e.ctrlKey && e.key === 'k') { e.preventDefault(); input.focus(); }
            if (document.activeElement !== input && modal.style.display !== 'flex') {
                let filtered = todos.filter(t => {
                    const matchesSearch = t.text.toLowerCase().includes(searchTerm);
                    const matchesCategory = (currentFilter === 'all') || (currentFilter === 'pending' && !t.completed) || (currentFilter === 'completed' && t.completed);
                    return matchesSearch && matchesCategory;
                });
                filtered.sort((a,b) => (a.completed === b.completed) ? new Date(b.createdAt) - new Date(a.createdAt) : (a.completed ? 1 : -1));
                if (e.key === 'ArrowDown') { e.preventDefault(); selectedIndex = (selectedIndex + 1) % filtered.length; render(); }
                if (e.key === 'ArrowUp') { e.preventDefault(); selectedIndex = (selectedIndex - 1 + filtered.length) % filtered.length; render(); }
                if (e.key === ' ' && selectedIndex !== -1) { e.preventDefault(); toggleTodo(filtered[selectedIndex].id); }
                if (e.key === 'Delete' && selectedIndex !== -1) { e.preventDefault(); askDeleteTodo(filtered[selectedIndex].id); }
            }
        });

        // LISTENERS
        addBtn.addEventListener('click', addTodo);
        input.addEventListener('keypress', e => e.key === 'Enter' && addTodo());
        themeToggle.addEventListener('click', () => applyTheme(currentTheme === 'gray' ? 'light' : 'gray'));
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentFilter = btn.dataset.filter; render();
                // Scroll para o topo ao trocar categoria
                scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
        applyTheme(currentTheme); render(); input.focus();
    </script>
</body>
</html>
