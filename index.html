<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro | Dashboard</title>
    
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            /* TEMA PADRÃO: CINZA ESCURO (DARK NEUTRAL) */
            --bg-deep: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.9);
            --main-bg: rgba(30, 41, 59, 0.5);
            --accent-primary: #3b82f6; 
            --accent-glow: rgba(59, 130, 246, 0.3);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --text-purple: #60a5fa; /* Usado para variações de cor do texto */
            --border: rgba(255, 255, 255, 0.1);
            --item-hover: rgba(255, 255, 255, 0.05);
            --radius-lg: 16px;
            --radius-md: 10px;
            --card-bg: rgba(255, 255, 255, 0.03);
            --input-bg: rgba(0, 0, 0, 0.2);
        }

        /* TEMA LIGHT (CLARO) */
        body.theme-light {
            --bg-deep: #f1f5f9;
            --sidebar-bg: #ffffff;
            --main-bg: #f8fafc;
            --accent-primary: #2563eb; 
            --accent-glow: rgba(37, 99, 235, 0.1);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-purple: #2563eb;
            --border: #e2e8f0;
            --item-hover: #f1f5f9;
            --card-bg: #ffffff;
            --input-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-deep);
            background-image: 
                radial-gradient(circle at 0% 0%, var(--accent-glow) 0%, transparent 35%),
                radial-gradient(circle at 100% 100%, var(--accent-glow) 0%, transparent 35%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        /* Layout Container Principal */
        .dashboard-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 100%;
            max-width: 1280px; 
            height: 85vh; 
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: appEntry 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transition: background 0.4s ease, border-color 0.4s ease;
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.98) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* --- SIDEBAR --- */
        aside {
            background: rgba(0, 0, 0, 0.05);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
            padding-left: 8px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: var(--accent-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, var(--text-main), var(--accent-primary));
            -webkit-background-clip: text;
            background-clip: text; /* Correção de compatibilidade */
            -webkit-text-fill-color: transparent;
        }

        .nav-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            margin-top: 24px;
            padding-left: 8px;
        }

        .filter-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            background: transparent;
            border: none;
            width: 100%;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
            text-align: left;
        }

        .filter-btn:hover {
            background: var(--item-hover);
            color: var(--text-main);
        }

        .filter-btn.active {
            background: var(--accent-glow);
            color: var(--accent-primary);
            font-weight: 600;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
        }

        .stats-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 16px;
        }

        .stat-line {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .progress-bar {
            height: 4px;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-primary);
            width: 0%;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        main {
            display: flex;
            flex-direction: column;
            background: var(--main-bg);
            overflow: hidden;
            transition: background 0.4s ease;
        }

        header {
            padding: 32px 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-info h2 {
            font-size: 24px;
            font-weight: 700;
        }

        .header-info p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Botão Mudar Tema */
        .theme-toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .theme-toggle-btn:hover {
            border-color: var(--accent-primary);
            background: var(--item-hover);
        }

        /* Área de Input */
        .input-section {
            padding: 0 48px 32px;
        }

        .input-container {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--accent-primary);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .input-container input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 16px;
            padding: 12px 0;
        }

        .btn-add {
            background: var(--accent-primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }

        /* Lista de Tarefas */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 48px 40px;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            margin-bottom: 12px;
            padding: 16px 24px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .todo-item:hover {
            transform: scale(1.005);
            border-color: var(--accent-primary);
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--accent-primary);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .todo-item.completed .checkbox {
            background: var(--accent-primary);
        }

        .checkbox i {
            color: white;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s;
        }

        .todo-item.completed .checkbox i {
            opacity: 1;
            transform: scale(1);
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            transition: all 0.2s;
        }

        .todo-item.completed .task-title {
            color: var(--text-muted);
            text-decoration: line-through;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .todo-item:hover .task-actions {
            opacity: 1;
        }

        .action-btn {
            background: var(--item-hover);
            border: none;
            padding: 8px;
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--accent-primary);
            color: white;
        }

        .action-btn.del:hover {
            background: #ef4444;
        }

        .action-btn.edit:hover {
            background: #3b82f6; 
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 0;
            color: var(--text-muted);
        }

        /* Responsividade */
        @media (max-width: 950px) {
            .dashboard-container {
                grid-template-columns: 1fr;
                height: 95vh;
            }
            aside {
                display: none;
            }
            header, .input-section, .content-scroll {
                padding-left: 24px;
                padding-right: 24px;
            }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside>
            <div class="logo-section">
                <div class="logo-icon"><i data-lucide="zap" size="18" color="white"></i></div>
                <span class="logo-text">TaskFlow</span>
            </div>

            <nav>
                <div class="nav-label">Menu</div>
                <button class="filter-btn active" data-filter="all">
                    <i data-lucide="layout-grid" size="18"></i> Todas
                </button>
                <button class="filter-btn" data-filter="pending">
                    <i data-lucide="clock" size="18"></i> Pendentes
                </button>
                <button class="filter-btn" data-filter="completed">
                    <i data-lucide="check-circle" size="18"></i> Concluídas
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="stats-card">
                    <div class="stat-line">
                        <span>Progresso</span>
                        <span id="progress-percent">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="stat-line" style="margin-top: 12px; opacity: 0.7;">
                        <span id="count-summary">0/0 tarefas</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main>
            <header>
                <div class="header-info">
                    <h2 id="filter-title">Todas as Tarefas</h2>
                    <p id="current-date">-- de --</p>
                </div>
                
                <div class="header-actions">
                    <!-- BOTÃO DE TEMA -->
                    <button class="theme-toggle-btn" id="theme-toggle" title="Alternar Tema">
                        <i data-lucide="sun" id="theme-icon" size="16"></i>
                        <span id="theme-name">Modo Claro</span>
                    </button>

                    <div class="user-pill" style="display: flex; align-items: center; gap: 10px; background: var(--card-bg); padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid var(--border);">
                        <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></div>
                        Workspace Ativa
                    </div>
                </div>
            </header>

            <section class="input-section">
                <div class="input-container">
                    <i data-lucide="search" size="18" color="#94a3b8"></i>
                    <input type="text" id="todo-input" placeholder="Adicionar nova tarefa..." autocomplete="off">
                    <button class="btn-add" id="add-btn">
                        <i data-lucide="plus" size="18"></i>
                        <span>Adicionar</span>
                    </button>
                </div>
            </section>

            <section class="content-scroll">
                <ul class="todo-list" id="todo-list">
                    <!-- Tasks here -->
                </ul>

                <div id="empty-state" class="empty-state" style="display: none;">
                    <i data-lucide="sparkles" size="40" style="margin-bottom: 16px; opacity: 0.5;"></i>
                    <p>Tudo limpo por aqui! Aproveite seu dia.</p>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- Estado ---
        let todos = JSON.parse(localStorage.getItem('tasks_v3_pro')) || [];
        let currentFilter = 'all';
        let currentTheme = localStorage.getItem('taskflow_theme') || 'gray'; 

        // --- Seletores ---
        const input = document.getElementById('todo-input');
        const addBtn = document.getElementById('add-btn');
        const todoList = document.getElementById('todo-list');
        const dateDisplay = document.getElementById('current-date');
        const emptyState = document.getElementById('empty-state');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const filterTitle = document.getElementById('filter-title');
        const progressFill = document.getElementById('progress-fill');
        const progressPercent = document.getElementById('progress-percent');
        const countSummary = document.getElementById('count-summary');
        
        const themeToggle = document.getElementById('theme-toggle');
        const themeName = document.getElementById('theme-name');
        const themeIcon = document.getElementById('theme-icon');

        // --- Gerenciamento de Tema ---
        function applyTheme(theme) {
            document.body.classList.remove('theme-light');
            
            if (theme === 'light') {
                document.body.classList.add('theme-light');
                themeName.innerText = "Modo Escuro";
                themeIcon.setAttribute('data-lucide', 'moon');
            } else {
                themeName.innerText = "Modo Claro";
                themeIcon.setAttribute('data-lucide', 'sun');
            }
            localStorage.setItem('taskflow_theme', theme);
            currentTheme = theme;
            lucide.createIcons();
        }

        themeToggle.addEventListener('click', () => {
            if (currentTheme === 'gray') applyTheme('light');
            else applyTheme('gray');
        });

        // --- Init ---
        function init() {
            renderDate();
            applyTheme(currentTheme);
            renderTodos();
            lucide.createIcons();
        }

        function renderDate() {
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            dateDisplay.innerText = new Date().toLocaleDateString('pt-BR', options);
        }

        // --- Funções ---
        function addTodo() {
            const text = input.value.trim();
            if (!text) return;

            const newTodo = {
                id: Date.now(),
                text: text,
                completed: false
            };

            todos.unshift(newTodo);
            save();
            input.value = '';
            renderTodos();
        }

        function toggleTodo(id) {
            todos = todos.map(t => t.id === id ? {...t, completed: !t.completed} : t);
            save();
            renderTodos();
        }

        function deleteTodo(id) {
            todos = todos.filter(t => t.id !== id);
            save();
            renderTodos();
        }

        function editTodo(id) {
            const todo = todos.find(t => t.id === id);
            if (!todo) return;

            const newText = prompt("Editar tarefa:", todo.text);
            
            if (newText !== null && newText.trim() !== "") {
                todos = todos.map(t => t.id === id ? { ...t, text: newText.trim() } : t);
                save();
                renderTodos();
            }
        }

        function save() {
            localStorage.setItem('tasks_v3_pro', JSON.stringify(todos));
        }

        function renderTodos() {
            todoList.innerHTML = '';
            
            const filtered = todos.filter(t => {
                if (currentFilter === 'pending') return !t.completed;
                if (currentFilter === 'completed') return t.completed;
                return true;
            });

            const total = todos.length;
            const done = todos.filter(t => t.completed).length;
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            
            progressFill.style.width = `${percent}%`;
            progressPercent.innerText = `${percent}%`;
            countSummary.innerText = `${done}/${total} tarefas`;

            if (filtered.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                filtered.forEach(todo => {
                    const li = document.createElement('li');
                    li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                    li.innerHTML = `
                        <div class="checkbox" onclick="toggleTodo(${todo.id})">
                            <i data-lucide="check" size="14"></i>
                        </div>
                        <div class="task-content">
                            <div class="task-title">${todo.text}</div>
                        </div>
                        <div class="task-actions">
                            <button class="action-btn edit" onclick="editTodo(${todo.id})" title="Editar texto">
                                <i data-lucide="pencil" size="14"></i>
                            </button>
                            <button class="action-btn del" onclick="deleteTodo(${todo.id})" title="Excluir tarefa">
                                <i data-lucide="trash-2" size="14"></i>
                            </button>
                        </div>
                    `;
                    todoList.appendChild(li);
                });
            }
            lucide.createIcons();
        }

        // --- Listeners ---
        addBtn.addEventListener('click', addTodo);
        input.addEventListener('keypress', (e) => e.key === 'Enter' && addTodo());

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                
                const labels = { all: 'Todas as Tarefas', pending: 'Pendentes', completed: 'Concluídas' };
                filterTitle.innerText = labels[currentFilter];
                
                renderTodos();
            });
        });

        init();
    </script>
</body>
</html>
